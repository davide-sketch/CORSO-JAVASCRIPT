Il conta cifre
Scrivi un programma che dato un numero conti da quante cifre è formato.

Esempio

Input: numero: 245
Output: numero cifre: 3 -->
<!DOCTYPE html>
<html lang="en">

<head>

<body>

    </script>
</body>
