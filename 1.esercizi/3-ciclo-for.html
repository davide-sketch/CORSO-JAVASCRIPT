<!-- Ciclo for
Progetta un algoritmo in Javascript che stampi tutte le coppie di numeri naturali la cui somma è un numero intero a scelta.

Esempio

Input: numero 7
Output: 
- 0-7
- 1-6
- 2-5
- 3-4
- 4-3
- 5-2
- 6-1
- 7-0 -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>esercizo 3</title>
</head>

<body>
    <script>



        let tette = 10;

        for (let cacca = 0; cacca <= tette; cacca++) {
            let culo = tette - cacca;
            console.log(cacca + "-" + culo);
        }

        //ho scelto un numero 
        //(inizilizzazione)scelgo il nome della variabile la prima cacca è uguale a zero che il loop inizia da zero
        //(contatore)cacca è minore uguale a tette significa che continua finchè è minore uguale a tette
        //a ogni giro cacca si incrementa
        //scelgo il secondo nome della variabile culo è ugulae a tette meno cacca
        //cacca + culo uguale tette

    </script>
</body>

</html>
