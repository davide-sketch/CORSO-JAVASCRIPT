        //1) Creare una Stringa

        let nome = 'Celtrude';

        console.log(numero)

        let foglia = "sono il migliore";
        let elemento = `<h1>${20 + 5} bellissima<h1>`//questa è la magia  di template literals che si puo andare d'accapo senza intaccare l'html
