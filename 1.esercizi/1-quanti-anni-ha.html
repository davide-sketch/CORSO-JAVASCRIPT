<!-- Quanti anni ha?
Scrivi un programma che dato l’anno corrente e un anno di nascita determini:

l’età della persona
quanti anni sono necessari per raggiungere i 100
Esempio:

Input: anno corrente = 2021, anno di nascita = 1996
Output: età = 25, anni mancanti = 75 -->


<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>esercizio 1</title>
</head>

<body>
    <script>
        let annoCorrente = 2026
        let annoNascita = 1996
        let eta = annoCorrente - annoNascita;
        let anniMancanti = 100 - eta;
        console.log(' età = ' + eta + ', anni mancanti = ' + anniMancanti)
    </script>
</body>

</html>
